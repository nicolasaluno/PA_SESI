<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>

    <h2>Formulário de Cadastro</h2>

    <label>Nome:</label>
    <input type="text" id="nome"><br><br>

    <label>Sobrenome:</label>
    <input type="text" id="sobrenome"><br><br>

    <label>Idade:</label>
    <input type="number" id="idade"><br><br>

    <label>Profissão:</label>
    <input type="text" id="profissao"><br><br>

    <button onclick="mostrarMensagem()">Cadastrar</button>

    <br><br>

    <span id="resultado"></span>

    <script>
        function mostrarMensagem() {
            let nome = document.getElementById("nome").value;
            let sobrenome = document.getElementById("sobrenome").value;
            let idade = document.getElementById("idade").value;
            let profissao = document.getElementById("profissao").value;

            document.getElementById("resultado").innerHTML =
                `Bem vindo ${nome} ${sobrenome}, você tem ${idade} anos e trabalha como ${profissao}.`;
        }
    </script>
