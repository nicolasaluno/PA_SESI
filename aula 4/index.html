<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora 00</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    width:380px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

.botoes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.soma{background:#28a745;}
.sub{background:#dc3545;}
.mult{background:#ff9800;}
.div{background:#007bff;}

#resultado{
    margin-top:20px;
    padding:15px;
    background:#f4f4f4;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>🧮 Calculadora 00</h1>

    <input type="number" id="num1" placeholder="Primeiro número">
    <input type="number" id="num2" placeholder="Segundo número">

    <div class="botoes">
        <button class="soma" onclick="somar()">➕ Somar</button>
        <button class="sub" onclick="subtrair()">➖ Subtrair</button>
        <button class="mult" onclick="multiplicar()">✖ Multiplicar</button>
        <button class="div" onclick="dividir()">➗ Dividir</button>
    </div>

    <div id="resultado">Resultado:</div>
</div>

<script>
function pegarValores(){
    return {
        n1: Number(document.getElementById("num1").value),
        n2: Number(document.getElementById("num2").value)
    };
}

function somar(){
    let {n1,n2} = pegarValores();
    document.getElementById("resultado").innerHTML =
    "Resultado: " + (n1 + n2);
}

function subtrair(){
    let {n1,n2} = pegarValores();
    document.getElementById("resultado").innerHTML =
    "Resultado: " + (n1 - n2);
}

function multiplicar(){
    let {n1,n2} = pegarValores();
    document.getElementById("resultado").innerHTML =
    "Resultado: " + (n1 * n2);
}

function dividir(){
    let {n1,n2} = pegarValores();

    if(n2 === 0){
        document.getElementById("resultado").innerHTML =
        "❌ Não é possível dividir por zero";
        return;
    }

    document.getElementById("resultado").innerHTML =
    "Resultado: " + (n1 / n2);
}
</script>

</body>
</html>
